<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PandaiKids | Belajar Sambil Bermain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Poppins:wght@500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: #063b1d;
    }

    .homepage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      color: white;
      background-image: url("assets/background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .homepage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.45), transparent 25%),
        linear-gradient(to bottom, rgba(0,0,0,.10), rgba(0,0,0,.16) 55%, rgba(0,0,0,.42));
      z-index: 1;
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 5;
      width: min(1180px, calc(100% - 32px));
      margin: 20px auto 0;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 34px;
      background: rgba(255,255,255,.83);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 55px rgba(0,0,0,.18);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #182536;
      font-family: 'Baloo 2', cursive;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .logo-badge {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.06);
    }

    .logo-badge img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      object-position: top center;
    }

    .logo span span {
      color: #18a64c;
    }

    .nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      text-decoration: none;
      color: #223047;
      font-weight: 800;
      padding: 12px 18px;
      border-radius: 999px;
      transition: .25s;
    }

    .nav a:hover,
    .nav a.active {
      color: #0f8f42;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,.12);
    }

    .login {
      border: 0;
      padding: 13px 22px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(135deg, #19c866, #0b8d3d);
      box-shadow: 0 14px 30px rgba(9,142,61,.28);
    }

    .hero {
      position: relative;
      z-index: 3;
      min-height: calc(100vh - 90px);
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      align-items: center;
      gap: 20px;
      padding-bottom: 34px;
    }

    .side-menu {
      align-self: center;
      display: grid;
      gap: 14px;
      transform: translateY(45px);
    }

    .wood-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 76px;
      padding: 12px 20px;
      border-radius: 18px;
      color: #fff;
      text-decoration: none;
      font-size: 28px;
      font-weight: 800;
      text-shadow: 0 3px 8px rgba(0,0,0,.4);
      background:
        linear-gradient(90deg, rgba(102,55,19,.18), rgba(255,255,255,.10)),
        linear-gradient(180deg, #b66b24, #784213);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.20),
        inset 0 -5px 0 rgba(0,0,0,.18),
        0 18px 28px rgba(0,0,0,.28);
      transition: .22s;
    }

    .wood-btn:hover {
      transform: translateX(8px) scale(1.02);
    }

    .icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #20c466;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.18);
      font-size: 24px;
      flex: 0 0 auto;
    }

    .hero-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: -20px;
    }

    .headline {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(54px, 7vw, 104px);
      line-height: .82;
      letter-spacing: -1px;
      color: #19314b;
      text-shadow:
        0 4px 0 rgba(255,255,255,.55),
        0 12px 22px rgba(0,0,0,.18);
      margin-bottom: 16px;
    }

    .headline strong {
      color: #11a64d;
      display: block;
    }

    .subtitle {
      color: #1d2f45;
      font-weight: 800;
      font-size: clamp(18px, 2vw, 26px);
      text-shadow: 0 2px 8px rgba(255,255,255,.7);
      margin-bottom: 12px;
    }

    .subtitle span {
      color: #0c9d48;
    }

    .pandi-wrap {
      position: relative;
      width: min(360px, 44vw);
      margin-top: 4px;
      animation: pandiFloat 3.8s ease-in-out infinite;
      filter: drop-shadow(0 28px 34px rgba(0,0,0,.38));
    }

    .pandi {
      width: 100%;
      display: block;
      transform-origin: bottom center;
      animation: breathe 2.6s ease-in-out infinite;
    }

    .wave-paw {
      position: absolute;
      left: 15.5%;
      top: 34%;
      width: 25%;
      height: 22%;
      border-radius: 50%;
      pointer-events: none;
      transform-origin: 85% 85%;
      animation: wave 1.25s ease-in-out infinite;
    }

    .sparkle {
      position: absolute;
      font-size: 30px;
      animation: sparkle 1.7s ease-in-out infinite;
      text-shadow: 0 4px 10px rgba(0,0,0,.25);
    }

    .s1 { left: -38px; top: 42px; }
    .s2 { right: -30px; top: 80px; animation-delay: .45s; }
    .s3 { right: 26px; bottom: 44px; animation-delay: .9s; }

    .cta-row {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .cta {
      min-width: 240px;
      padding: 18px 30px;
      border-radius: 999px;
      border: 0;
      font-weight: 900;
      font-size: 21px;
      color: #fff;
      background: linear-gradient(135deg, #1dd66d, #079445);
      box-shadow: 0 18px 35px rgba(0,0,0,.28), inset 0 3px 0 rgba(255,255,255,.2);
      cursor: pointer;
    }

    .cta.secondary {
      color: #26364a;
      background: rgba(255,255,255,.92);
    }

    .right-card {
      opacity: 0;
      pointer-events: none;
    }

    .scroll-tip {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: #fff;
      font-size: 36px;
      animation: bounce 1.2s ease-in-out infinite;
      text-shadow: 0 5px 14px rgba(0,0,0,.35);
    }

    @keyframes pandiFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }

    @keyframes wave {
      0%, 100% { transform: rotate(-8deg); }
      50% { transform: rotate(18deg); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: .35; transform: scale(.85) rotate(0); }
      50% { opacity: 1; transform: scale(1.18) rotate(10deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    @media (max-width: 980px) {
      .topbar {
        border-radius: 24px;
      }

      .nav {
        display: none;
      }

      .logo {
        font-size: 28px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding-top: 32px;
      }

      .side-menu {
        order: 2;
        grid-template-columns: repeat(2, minmax(130px, 1fr));
        transform: none;
      }

      .wood-btn {
        font-size: 21px;
        min-height: 64px;
      }

      .hero-center {
        order: 1;
      }

      .pandi-wrap {
        width: min(320px, 70vw);
      }

      .headline {
        font-size: clamp(48px, 13vw, 72px);
      }

      .right-card {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .homepage {
        background-position: center;
      }

      .login {
        display: none;
      }

      .topbar {
        margin-top: 12px;
        width: calc(100% - 20px);
      }

      .logo-badge {
        width: 44px;
        height: 44px;
      }

      .logo-badge img {
        width: 48px;
        height: 48px;
      }

      .logo {
        font-size: 24px;
      }

      .side-menu {
        grid-template-columns: 1fr;
      }

      .cta {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <section class="homepage">
    <header class="topbar">
      <div class="logo">
        <div class="logo-badge">
          <img src="assets/pandi.png" alt="Pandi" />
        </div>
        <span>Pandai<span>Kids</span></span>
      </div>

      <nav class="nav">
        <a class="active" href="#">🏠 Utama</a>
        <a href="#">🎮 Quiz</a>
        <a href="#">🌍 Dunia</a>
        <a href="#">⭐ Koleksi</a>
        <a href="#">👨‍👩‍👧 Untuk Ibu Bapa</a>
      </nav>

      <button class="login">👤 Log Masuk</button>
    </header>

    <main class="hero">
      <aside class="side-menu">
        <a class="wood-btn" href="#"><span class="icon">🎮</span>Quiz</a>
        <a class="wood-btn" href="#"><span class="icon">🌍</span>Dunia</a>
        <a class="wood-btn" href="#"><span class="icon">⭐</span>Koleksi</a>
        <a class="wood-btn" href="#"><span class="icon">👨‍👩‍👧</span>Untuk<br>Ibu Bapa</a>
      </aside>

      <section class="hero-center">
        <h1 class="headline">Belajar Sambil <strong>Bermain</strong></h1>
        <p class="subtitle">Belajar jadi seronok dengan <span>Pandi!</span></p>

        <div class="pandi-wrap">
          <img class="pandi" src="assets/pandi.png" alt="Pandi melambai" />
          <div class="wave-paw"></div>
          <div class="sparkle s1">✨</div>
          <div class="sparkle s2">⭐</div>
          <div class="sparkle s3">💚</div>
        </div>

        <div class="cta-row">
          <button class="cta">🚀 Mula Belajar</button>
          <button class="cta secondary">🎁 Teroka Sekarang</button>
        </div>
      </section>

      <div class="right-card"></div>
    </main>

    <div class="scroll-tip">⌄</div>
  </section>
</body>
</html>
