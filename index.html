<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandi Production Mascot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <div class="hero-bg">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
    </div>

    <div class="hero-content">
      <h1>PandaiKids</h1>
      <p>Belajar sambil bermain bersama Pandi.</p>
      <button>Mula Belajar</button>
    </div>

    <!-- PANDI PRODUCTION V1 - Pure HTML + CSS -->
    <div class="pandi-stage" aria-label="Pandi mascot waving">
      <div class="pandi">

        <div class="pandi-shadow"></div>

        <div class="pandi-body">
          <div class="belly"></div>

          <div class="hoodie">
            <div class="hoodie-neck"></div>
            <div class="logo-badge">P</div>
            <div class="string string-left"></div>
            <div class="string string-right"></div>
            <div class="pocket"></div>
          </div>

          <div class="strap strap-left"></div>
          <div class="strap strap-right"></div>
        </div>

        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="foot foot-left"></div>
        <div class="foot foot-right"></div>

        <div class="arm arm-left">
          <div class="paw small-paw"></div>
        </div>

        <div class="arm arm-right waving-arm">
          <div class="paw big-paw">
            <span class="toe toe-1"></span>
            <span class="toe toe-2"></span>
            <span class="toe toe-3"></span>
            <span class="toe toe-4"></span>
            <span class="pad"></span>
          </div>
          <div class="spark spark-1"></div>
          <div class="spark spark-2"></div>
        </div>

        <div class="head">
          <div class="ear ear-left"></div>
          <div class="ear ear-right"></div>

          <div class="hair hair-1"></div>
          <div class="hair hair-2"></div>

          <div class="eye-patch patch-left"></div>
          <div class="eye-patch patch-right"></div>

          <div class="eye eye-left">
            <div class="iris"></div>
            <div class="shine"></div>
            <div class="blink"></div>
          </div>

          <div class="eye eye-right">
            <div class="iris"></div>
            <div class="shine"></div>
            <div class="blink"></div>
          </div>

          <div class="eyebrow eyebrow-left"></div>
          <div class="eyebrow eyebrow-right"></div>

          <div class="muzzle"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
          <div class="tongue"></div>

          <div class="blush blush-left"></div>
          <div class="blush blush-right"></div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
