<!-- WELCOME PANEL START - PandaiKids Build 13 -->
<div class="pk-welcome-panel" id="pkWelcomePanel">
  <div class="pk-welcome-leaf">☘️</div>
  <div class="pk-welcome-badge">Hai kawan baru! 👋</div>

  <h2>Pandi nak<br><span>kenal awak</span><br>dulu! 💗</h2>

  <p class="pk-welcome-text">
    Biar Pandi tahu nama, negeri dan umur awak supaya kita boleh belajar dan bermain bersama!
  </p>

  <form id="pkWelcomeForm" class="pk-welcome-form">
    <label class="pk-field">
      <span>👤</span>
      <input id="pkChildName" type="text" placeholder="Nama awak" autocomplete="off" required />
    </label>

    <label class="pk-field">
      <span>📍</span>
      <select id="pkChildState" required>
        <option value="">Pilih negeri</option>
        <option>Johor</option>
        <option>Kedah</option>
        <option>Kelantan</option>
        <option>Melaka</option>
        <option>Negeri Sembilan</option>
        <option>Pahang</option>
        <option>Perak</option>
        <option>Perlis</option>
        <option>Pulau Pinang</option>
        <option>Sabah</option>
        <option>Sarawak</option>
        <option>Selangor</option>
        <option>Terengganu</option>
        <option>W.P. Kuala Lumpur</option>
        <option>W.P. Labuan</option>
        <option>W.P. Putrajaya</option>
      </select>
    </label>

    <label class="pk-field">
      <span>🎂</span>
      <select id="pkChildAge" required>
        <option value="">Umur awak</option>
        <option>4 tahun</option>
        <option>5 tahun</option>
        <option>6 tahun</option>
        <option>7 tahun</option>
        <option>8 tahun</option>
        <option>9 tahun</option>
        <option>10 tahun</option>
        <option>11 tahun</option>
        <option>12 tahun</option>
      </select>
    </label>

    <button class="pk-start-btn" type="submit">Jom Mulakan Pengembaraan! 🚀</button>
  </form>

  <p class="pk-small-note">Tiada nama preset. Pandi tanya dahulu setiap pengguna baru.</p>
</div>

<div class="pk-pandi-bubble" id="pkPandiBubble" hidden>
  <strong id="pkBubbleTitle">Hai!</strong>
  <span id="pkBubbleText">Selamat datang ke PandaiKids!</span>
</div>
<!-- WELCOME PANEL END - PandaiKids Build 13 -->
